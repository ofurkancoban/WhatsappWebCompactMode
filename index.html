<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WhatsApp Web — Redesigned</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ===== DRAWER OVERLAY ===== -->
  <div id="drawer-overlay" class="drawer-overlay" onclick="closeDrawer()"></div>

  <!-- ===== DRAWER PANEL ===== -->
  <aside id="drawer" class="drawer">
    <div class="drawer-header">
      <button class="icon-btn" onclick="closeDrawer()" title="Kapat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <span class="drawer-title">Profil</span>
    </div>

    <!-- Profile Section -->
    <div class="drawer-profile">
      <div class="avatar-wrapper big">
        <div class="avatar" style="background: linear-gradient(135deg,#00e676,#00bfa5)">
          <span>OF</span>
        </div>
        <button class="avatar-edit-btn" title="Fotoğrafı değiştir">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 15.2A3.2 3.2 0 1 1 12 8.8a3.2 3.2 0 0 1 0 6.4zm7.2-10H17l-1.7-2H8.7L7 5.2H4.8A2.8 2.8 0 0 0 2 8v10a2.8 2.8 0 0 0 2.8 2.8h14.4A2.8 2.8 0 0 0 22 18V8a2.8 2.8 0 0 0-2.8-2.8z"/></svg>
        </button>
      </div>
      <h2 class="profile-name">Furkan Çoban</h2>
      <p class="profile-status">Hey there! I am using WhatsApp</p>
    </div>

    <!-- Drawer Menu Items -->
    <nav class="drawer-nav">
      <a class="drawer-item" href="#" onclick="closeDrawer()">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
        <span>Profilim</span>
        <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      </a>
      <a class="drawer-item" href="#" onclick="closeDrawer()">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.488.488 0 0 0-.59-.22l-2.39.96a7.03 7.03 0 0 0-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.37 1.04.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.57 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
        <span>Ayarlar</span>
        <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      </a>
      <a class="drawer-item" href="#" onclick="closeDrawer()">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
        <span>Gizlilik</span>
        <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      </a>
      <a class="drawer-item" href="#" onclick="closeDrawer()">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
        <span>Bildirimler</span>
        <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      </a>

      <div class="drawer-divider"></div>

      <a class="drawer-item danger" href="#" onclick="closeDrawer()">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
        <span>Çıkış Yap</span>
      </a>
    </nav>

    <!-- Theme Toggle -->
    <div class="drawer-theme">
      <span>Koyu Tema</span>
      <label class="toggle-switch">
        <input type="checkbox" id="theme-toggle" checked onchange="toggleTheme()" />
        <span class="toggle-track">
          <span class="toggle-thumb"></span>
        </span>
      </label>
    </div>
  </aside>

  <!-- ===== MAIN APP ===== -->
  <div id="app" class="app">

    <!-- ========== LEFT PANEL ========== -->
    <div class="left-panel">

      <!-- Top Bar -->
      <div class="left-topbar">
        <button class="avatar-btn" onclick="openDrawer()" title="Profil / Menü" id="drawer-trigger">
          <div class="avatar small" style="background: linear-gradient(135deg,#00e676,#00bfa5)">
            <span>OF</span>
          </div>
        </button>

        <div class="left-topbar-actions">
          <button class="icon-btn" title="Topluluklar">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15v-4H7l5-8v4h4l-5 8z"/></svg>
          </button>
          <button class="icon-btn" title="Yeni Sohbet" onclick="showNewChatToast()">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12z"/><path d="M7 9h2v2H7zm4 0h2v2h-2zm4 0h2v2h-2z"/></svg>
          </button>
          <button class="icon-btn" title="Menü" onclick="openDrawer()">
            <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
          </button>
        </div>
      </div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" onclick="switchTab(this, 'chats')">Sohbetler</button>
        <button class="tab" onclick="switchTab(this, 'communities')">Topluluklar</button>
        <button class="tab" onclick="switchTab(this, 'status')">Durum</button>
        <button class="tab" onclick="switchTab(this, 'channels')">Kanallar</button>
      </div>

      <!-- Search -->
      <div class="search-bar">
        <svg class="search-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input type="text" id="search-input" placeholder="Ara veya yeni sohbet başlat" oninput="filterContacts(this.value)" />
        <button class="icon-btn search-filter-btn" title="Filtrele">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 18h4v-2h-4v2zm-7-6h18v-2H3v2zm3-6h12V4H6v2z"/></svg>
        </button>
      </div>

      <!-- Contact List -->
      <div class="contact-list" id="contact-list">
        <!-- Rendered by JS -->
      </div>
    </div>

    <!-- ========== CHAT AREA ========== -->
    <div class="chat-area" id="chat-area">

      <!-- Welcome / Empty State -->
      <div class="welcome-screen" id="welcome-screen">
        <div class="welcome-inner">
          <div class="welcome-logo">
            <svg viewBox="0 0 60 60" fill="none">
              <circle cx="30" cy="30" r="30" fill="url(#grad1)"/>
              <defs>
                <linearGradient id="grad1" x1="0" y1="0" x2="60" y2="60">
                  <stop offset="0%" stop-color="#00e676"/>
                  <stop offset="100%" stop-color="#00bfa5"/>
                </linearGradient>
              </defs>
              <path d="M30 14C21.16 14 14 21.16 14 30c0 2.83.75 5.5 2.06 7.8L14 46l8.43-2.03A15.94 15.94 0 0 0 30 46c8.84 0 16-7.16 16-16S38.84 14 30 14zm8 21.8c-.34.97-1.98 1.85-2.73 1.97-.7.11-1.59.16-2.56-.16-.59-.19-1.35-.45-2.32-.88-4.08-1.76-6.74-5.89-6.94-6.17-.2-.28-1.63-2.17-1.63-4.14 0-1.97 1.03-2.94 1.4-3.34.34-.38.74-.47 1-.47.26 0 .51 0 .74.01.23.01.55-.09.86.66.34.78 1.14 2.75 1.24 2.95.1.2.17.44.03.7-.13.26-.2.42-.39.65-.2.23-.41.52-.59.7-.2.2-.4.41-.17.8.23.39 1.01 1.67 2.17 2.7 1.49 1.33 2.75 1.74 3.14 1.94.39.2.62.17.85-.1.23-.27.98-1.14 1.24-1.53.26-.39.52-.32.88-.19.36.13 2.3 1.08 2.69 1.28.39.2.65.3.75.46.1.16.1.93-.23 1.9z" fill="white"/>
            </svg>
          </div>
          <h1>WhatsApp Web</h1>
          <p>Telefonda yüklü olan WhatsApp'ı bilgisayardan kullanın.</p>
          <div class="welcome-hint">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
            <span>Uçtan uca şifreleme ile korunmaktadır.</span>
          </div>
        </div>
      </div>

      <!-- Active Chat -->
      <div class="chat-view" id="chat-view" style="display:none">
        <!-- Chat Header -->
        <div class="chat-header" id="chat-header">
          <div class="chat-header-left">
            <div class="avatar medium" id="chat-avatar"></div>
            <div class="chat-header-info">
              <h3 id="chat-name">İsim</h3>
              <p id="chat-status-label">çevrimiçi</p>
            </div>
          </div>
          <div class="chat-header-actions">
            <button class="icon-btn" title="Sesli Arama">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>
            </button>
            <button class="icon-btn" title="Video Arama">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
            </button>
            <button class="icon-btn" title="Ara">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            </button>
            <button class="icon-btn" title="Daha Fazla">
              <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
            </button>
          </div>
        </div>

        <!-- Messages -->
        <div class="messages-area" id="messages-area"></div>

        <!-- Input Bar -->
        <div class="input-bar">
          <button class="icon-btn" title="Emoji">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/></svg>
          </button>
          <button class="icon-btn" title="Dosya Ekle">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/></svg>
          </button>
          <div class="message-input-wrapper">
            <input type="text" id="message-input" placeholder="Mesaj yaz" onkeydown="handleEnter(event)" />
          </div>
          <button class="icon-btn send-btn" id="send-btn" onclick="sendMessage()" title="Gönder">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast"></div>

  <script src="app.js"></script>
</body>
</html>
